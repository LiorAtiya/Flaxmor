services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openwebui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openwebui_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-openwebui}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openwebui} -d ${POSTGRES_DB:-openwebui}"]
      interval: 5s
      timeout: 5s
      retries: 10

  middleware:
    build: ./middleware
    environment:
      # Required — fails fast with a clear message if .env is missing the key.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required - copy env.example to .env and set it}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SERVED_MODELS: ${SERVED_MODELS:-["gpt-4o-mini","gpt-4o"]}
      CONNECT_TIMEOUT_SECONDS: ${CONNECT_TIMEOUT_SECONDS:-10.0}
      READ_TIMEOUT_SECONDS: ${READ_TIMEOUT_SECONDS:-120.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    healthcheck:
      # slim image has no curl — use the stdlib instead.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.5
    depends_on:
      postgres:
        condition: service_healthy
      middleware:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openwebui}:${POSTGRES_PASSWORD:-openwebui_local_dev}@postgres:5432/${POSTGRES_DB:-openwebui}
      # The trick: Open WebUI thinks this is OpenAI. It's our middleware.
      OPENAI_API_BASE_URL: http://middleware:8000/v1
      # Must be non-empty for Open WebUI; the middleware ignores client keys
      # and authenticates upstream with its own server-side key.
      OPENAI_API_KEY: dummy-key-middleware-authenticates
      ENABLE_OLLAMA_API: "false"
      # Local-dev convenience: skip the signup/login flow entirely.
      WEBUI_AUTH: "false"
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  postgres-data:
  open-webui-data:
